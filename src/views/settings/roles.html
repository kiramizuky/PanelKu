<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roles — Linux Panel</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/css/app.css" rel="stylesheet">
</head>
<body>
<div class="lp-wrapper">
  <!-- Sidebar -->
  <aside class="lp-sidebar" id="sidebar">
    <div class="lp-sidebar-brand"><div class="lp-brand-icon">⚡</div><span class="lp-brand-text">Linux Panel</span></div>
    <nav class="lp-nav">
      <div class="lp-nav-section">Overview</div>
      <div class="lp-nav-item"><a href="/dashboard" class="lp-nav-link"><span class="lp-nav-icon"><i class="bi bi-grid-1x2-fill"></i></span><span class="lp-nav-label">Dashboard</span></a></div>
      <div class="lp-nav-item"><a href="/monitor" class="lp-nav-link"><span class="lp-nav-icon"><i class="bi bi-activity"></i></span><span class="lp-nav-label">Monitoring</span></a></div>
      <div class="lp-nav-section">Tools</div>
      <div class="lp-nav-item"><a href="/terminal" class="lp-nav-link"><span class="lp-nav-icon"><i class="bi bi-terminal-fill"></i></span><span class="lp-nav-label">Terminal</span></a></div>
      <div class="lp-nav-item"><a href="/filemanager" class="lp-nav-link"><span class="lp-nav-icon"><i class="bi bi-folder2-open"></i></span><span class="lp-nav-label">File Manager</span></a></div>
      <div class="lp-nav-section">Administration</div>
      <div class="lp-nav-item"><a href="/settings/users" class="lp-nav-link"><span class="lp-nav-icon"><i class="bi bi-people-fill"></i></span><span class="lp-nav-label">Users</span></a></div>
      <div class="lp-nav-item"><a href="/settings/roles" class="lp-nav-link active"><span class="lp-nav-icon"><i class="bi bi-key-fill"></i></span><span class="lp-nav-label">Roles</span></a></div>
    </nav>
    <div class="lp-sidebar-footer">
      <div style="display:flex;align-items:center;gap:10px;padding:4px 0">
        <div class="lp-user-avatar lp-user-initials" style="width:32px;height:32px;font-size:12px">A</div>
        <div style="overflow:hidden;flex:1"><div class="lp-user-name" style="font-size:13px;font-weight:500">—</div></div>
        <button onclick="LP.logout()" style="background:none;border:none;color:var(--text-muted);font-size:16px;cursor:pointer"><i class="bi bi-box-arrow-right"></i></button>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <div class="lp-main" id="mainContent">
    <header class="lp-topbar">
      <div class="lp-topbar-left">
        <button class="lp-toggle-btn" id="sidebarToggle"><i class="bi bi-list"></i></button>
        <nav class="lp-breadcrumb"><span>Linux Panel</span><i class="bi bi-chevron-right" style="font-size:10px"></i><span class="current">Roles & Permissions</span></nav>
      </div>
      <div class="lp-topbar-right">
        <div class="dropdown">
          <div class="lp-user-avatar lp-user-initials" data-bs-toggle="dropdown" style="cursor:pointer">A</div>
          <ul class="dropdown-menu dropdown-menu-end" style="background:var(--bg-secondary);border:1px solid var(--border-color)">
            <li><button class="dropdown-item" onclick="LP.logout()" style="color:var(--accent-danger);font-size:13px;padding:8px 14px"><i class="bi bi-box-arrow-right me-2"></i>Logout</button></li>
          </ul>
        </div>
      </div>
    </header>

    <main class="lp-content">
      <div class="lp-page-header" style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <h1 class="lp-page-title">Roles & Permissions</h1>
          <p class="lp-page-subtitle">Configure system access roles</p>
        </div>
        <button class="btn-lp btn-lp-primary" onclick="RolesPage.showCreateModal()"><i class="bi bi-plus-lg"></i> Add Role</button>
      </div>

      <div class="row g-3" id="rolesContainer">
        <div class="col-12" style="text-align:center;color:var(--text-muted);padding:40px">Loading roles...</div>
      </div>
    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/app.js"></script>
<script>
const RolesPage = (() => {
  async function loadRoles() {
    const res = await LP.get('/roles');
    const container = document.getElementById('rolesContainer');
    if (!res?.success) {
      container.innerHTML = '<div class="col-12 text-center text-danger">Failed to load roles</div>';
      return;
    }

    const roles = res.data.roles || [];
    container.innerHTML = roles.map(r => `
      <div class="col-12 col-md-6 col-lg-4">
        <div class="lp-card h-100" style="border-top:3px solid ${r.color || 'var(--accent-primary)'}">
          <div class="lp-card-header">
            <span class="lp-card-title">${r.name} ${r.isSystem ? '<span class="lp-badge lp-badge-info" style="font-size:9px">SYSTEM</span>' : ''}</span>
            <div>
              <button class="btn-lp btn-lp-ghost btn-lp-icon" title="Edit"><i class="bi bi-pencil"></i></button>
              ${!r.isSystem ? `<button class="btn-lp btn-lp-ghost btn-lp-icon text-danger" title="Delete"><i class="bi bi-trash"></i></button>` : ''}
            </div>
          </div>
          <div class="lp-card-body">
            <p style="font-size:13px;color:var(--text-muted);margin-bottom:16px">${r.description || 'No description'}</p>
            <div style="font-size:11px;color:var(--text-secondary);text-transform:uppercase;margin-bottom:8px">Permissions</div>
            <div style="display:flex;flex-wrap:wrap;gap:4px">
              ${r.permissions?.slice(0, 6).map(p => `<span class="lp-badge" style="background:var(--bg-secondary);border:1px solid var(--border-color)">${p.resource.split('_').join(' ')}</span>`).join('')}
              ${(r.permissions?.length || 0) > 6 ? `<span class="lp-badge" style="background:var(--bg-secondary)">+${r.permissions.length - 6} more</span>` : ''}
            </div>
          </div>
        </div>
      </div>
    `).join('');
  }

  return {
    async init() {
      await LP.init();
      if (!LP.state.accessToken) return;
      loadRoles();
    },
    showCreateModal() { LP.toast('Role creation coming soon', 'info'); }
  };
})();
document.addEventListener('DOMContentLoaded', () => RolesPage.init());
</script>
</body>
</html>
