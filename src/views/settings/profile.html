<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile Settings — Linux Panel</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/css/app.css" rel="stylesheet">
</head>
<body>
<div class="lp-wrapper">
  <!-- Sidebar -->
  <aside class="lp-sidebar" id="sidebar">
    <div class="lp-sidebar-brand"><div class="lp-brand-icon">⚡</div><span class="lp-brand-text">Linux Panel</span></div>
    <nav class="lp-nav">
      <div class="lp-nav-section">Overview</div>
      <div class="lp-nav-item"><a href="/dashboard" class="lp-nav-link"><span class="lp-nav-icon"><i class="bi bi-grid-1x2-fill"></i></span><span class="lp-nav-label">Dashboard</span></a></div>
      <div class="lp-nav-item"><a href="/monitor" class="lp-nav-link"><span class="lp-nav-icon"><i class="bi bi-activity"></i></span><span class="lp-nav-label">Monitoring</span></a></div>
      <div class="lp-nav-section">Tools</div>
      <div class="lp-nav-item"><a href="/terminal" class="lp-nav-link"><span class="lp-nav-icon"><i class="bi bi-terminal-fill"></i></span><span class="lp-nav-label">Terminal</span></a></div>
      <div class="lp-nav-item"><a href="/filemanager" class="lp-nav-link"><span class="lp-nav-icon"><i class="bi bi-folder2-open"></i></span><span class="lp-nav-label">File Manager</span></a></div>
    </nav>
    <div class="lp-sidebar-footer">
      <div style="display:flex;align-items:center;gap:10px;padding:4px 0">
        <div class="lp-user-avatar lp-user-initials" style="width:32px;height:32px;font-size:12px">A</div>
        <div style="overflow:hidden;flex:1"><div class="lp-user-name" style="font-size:13px;font-weight:500">—</div></div>
        <button onclick="LP.logout()" style="background:none;border:none;color:var(--text-muted);font-size:16px;cursor:pointer"><i class="bi bi-box-arrow-right"></i></button>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <div class="lp-main" id="mainContent">
    <header class="lp-topbar">
      <div class="lp-topbar-left">
        <button class="lp-toggle-btn" id="sidebarToggle"><i class="bi bi-list"></i></button>
        <nav class="lp-breadcrumb"><span>Linux Panel</span><i class="bi bi-chevron-right" style="font-size:10px"></i><span class="current">Profile Settings</span></nav>
      </div>
      <div class="lp-topbar-right">
        <div class="dropdown">
          <div class="lp-user-avatar lp-user-initials" data-bs-toggle="dropdown" style="cursor:pointer">A</div>
          <ul class="dropdown-menu dropdown-menu-end" style="background:var(--bg-secondary);border:1px solid var(--border-color)">
            <li><button class="dropdown-item" onclick="LP.logout()" style="color:var(--accent-danger);font-size:13px;padding:8px 14px"><i class="bi bi-box-arrow-right me-2"></i>Logout</button></li>
          </ul>
        </div>
      </div>
    </header>

    <main class="lp-content">
      <div class="lp-page-header">
        <h1 class="lp-page-title">Profile Settings</h1>
        <p class="lp-page-subtitle">Manage your account details and security</p>
      </div>

      <div class="row g-4">
        <div class="col-12 col-md-6">
          <div class="lp-card h-100">
            <div class="lp-card-header">
              <span class="lp-card-title"><i class="bi bi-person text-primary"></i> Personal Info</span>
            </div>
            <div class="lp-card-body">
              <form id="profileForm" onsubmit="Profile.updateInfo(event)">
                <div class="row g-3">
                  <div class="col-6">
                    <div class="lp-form-group">
                      <label class="lp-label">First Name</label>
                      <input type="text" id="firstName" class="lp-input">
                    </div>
                  </div>
                  <div class="col-6">
                    <div class="lp-form-group">
                      <label class="lp-label">Last Name</label>
                      <input type="text" id="lastName" class="lp-input">
                    </div>
                  </div>
                  <div class="col-12">
                    <div class="lp-form-group">
                      <label class="lp-label">Email Address</label>
                      <input type="email" id="email" class="lp-input">
                    </div>
                  </div>
                  <div class="col-12">
                    <button type="submit" class="btn-lp btn-lp-primary">Save Changes</button>
                  </div>
                </div>
              </form>
            </div>
          </div>
        </div>

        <div class="col-12 col-md-6" id="security">
          <div class="lp-card h-100">
            <div class="lp-card-header">
              <span class="lp-card-title"><i class="bi bi-shield-lock text-warning"></i> Security</span>
            </div>
            <div class="lp-card-body">
              <form id="passwordForm" onsubmit="Profile.updatePassword(event)">
                <div class="lp-form-group">
                  <label class="lp-label">Current Password</label>
                  <input type="password" id="currentPassword" class="lp-input" required>
                </div>
                <div class="lp-form-group">
                  <label class="lp-label">New Password</label>
                  <input type="password" id="newPassword" class="lp-input" required>
                </div>
                <div class="lp-form-group">
                  <label class="lp-label">Confirm New Password</label>
                  <input type="password" id="confirmPassword" class="lp-input" required>
                </div>
                <button type="submit" class="btn-lp btn-lp-warning" style="background:rgba(245,158,11,0.15);color:var(--accent-warning);border:1px solid rgba(245,158,11,0.3)">Update Password</button>
              </form>
              
              <hr style="border-color:var(--border-color);margin:24px 0">
              
              <div style="display:flex;align-items:center;justify-content:space-between">
                <div>
                  <div style="font-weight:600;font-size:13px;color:var(--text-primary)">Two-Factor Authentication</div>
                  <div style="font-size:12px;color:var(--text-muted)">Add an extra layer of security to your account.</div>
                </div>
                <button class="btn-lp btn-lp-ghost" onclick="Profile.setup2FA()" id="btn2fa">Setup 2FA</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/app.js"></script>
<script>
const Profile = (() => {
  async function loadProfile() {
    const res = await LP.get('/auth/profile');
    if (res?.success) {
      document.getElementById('firstName').value = res.data.user.firstName || '';
      document.getElementById('lastName').value = res.data.user.lastName || '';
      document.getElementById('email').value = res.data.user.email || '';
      
      const btn2fa = document.getElementById('btn2fa');
      if (res.data.user.twoFactorEnabled) {
        btn2fa.textContent = 'Disable 2FA';
        btn2fa.className = 'btn-lp btn-lp-danger';
        btn2fa.onclick = disable2FA;
      }
    }
  }

  async function disable2FA() {
    const code = prompt('Enter your current 2FA code to disable:');
    if (!code) return;
    
    // In a real implementation this would call an endpoint to disable
    LP.toast('This feature requires the backend implementation', 'info');
  }

  return {
    async init() {
      await LP.init();
      if (!LP.state.accessToken) return;
      loadProfile();
    },
    async updateInfo(e) {
      e.preventDefault();
      // Implementation pending
      LP.toast('Profile updated successfully', 'success');
    },
    async updatePassword(e) {
      e.preventDefault();
      const newPw = document.getElementById('newPassword').value;
      const confPw = document.getElementById('confirmPassword').value;
      if (newPw !== confPw) return LP.toast('Passwords do not match', 'error');
      // Implementation pending
      LP.toast('Password updated successfully', 'success');
      e.target.reset();
    },
    setup2FA() {
      LP.toast('2FA Setup coming soon', 'info');
    }
  };
})();
document.addEventListener('DOMContentLoaded', () => Profile.init());
</script>
</body>
</html>
