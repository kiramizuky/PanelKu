<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Users — Linux Panel</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/css/app.css" rel="stylesheet">
</head>
<body>
<div class="lp-wrapper">
  <!-- Sidebar -->
  <aside class="lp-sidebar" id="sidebar">
    <div class="lp-sidebar-brand"><div class="lp-brand-icon">⚡</div><span class="lp-brand-text">Linux Panel</span></div>
    <nav class="lp-nav">
      <div class="lp-nav-section">Overview</div>
      <div class="lp-nav-item"><a href="/dashboard" class="lp-nav-link"><span class="lp-nav-icon"><i class="bi bi-grid-1x2-fill"></i></span><span class="lp-nav-label">Dashboard</span></a></div>
      <div class="lp-nav-item"><a href="/monitor" class="lp-nav-link"><span class="lp-nav-icon"><i class="bi bi-activity"></i></span><span class="lp-nav-label">Monitoring</span></a></div>
      <div class="lp-nav-section">Tools</div>
      <div class="lp-nav-item"><a href="/terminal" class="lp-nav-link"><span class="lp-nav-icon"><i class="bi bi-terminal-fill"></i></span><span class="lp-nav-label">Terminal</span></a></div>
      <div class="lp-nav-item"><a href="/filemanager" class="lp-nav-link"><span class="lp-nav-icon"><i class="bi bi-folder2-open"></i></span><span class="lp-nav-label">File Manager</span></a></div>
      <div class="lp-nav-section">Administration</div>
      <div class="lp-nav-item"><a href="/settings/users" class="lp-nav-link active"><span class="lp-nav-icon"><i class="bi bi-people-fill"></i></span><span class="lp-nav-label">Users</span></a></div>
      <div class="lp-nav-item"><a href="/settings/roles" class="lp-nav-link"><span class="lp-nav-icon"><i class="bi bi-key-fill"></i></span><span class="lp-nav-label">Roles</span></a></div>
    </nav>
    <div class="lp-sidebar-footer">
      <div style="display:flex;align-items:center;gap:10px;padding:4px 0">
        <div class="lp-user-avatar lp-user-initials" style="width:32px;height:32px;font-size:12px">A</div>
        <div style="overflow:hidden;flex:1"><div class="lp-user-name" style="font-size:13px;font-weight:500">—</div></div>
        <button onclick="LP.logout()" style="background:none;border:none;color:var(--text-muted);font-size:16px;cursor:pointer"><i class="bi bi-box-arrow-right"></i></button>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <div class="lp-main" id="mainContent">
    <header class="lp-topbar">
      <div class="lp-topbar-left">
        <button class="lp-toggle-btn" id="sidebarToggle"><i class="bi bi-list"></i></button>
        <nav class="lp-breadcrumb"><span>Linux Panel</span><i class="bi bi-chevron-right" style="font-size:10px"></i><span class="current">Users</span></nav>
      </div>
      <div class="lp-topbar-right">
        <div class="dropdown">
          <div class="lp-user-avatar lp-user-initials" data-bs-toggle="dropdown" style="cursor:pointer">A</div>
          <ul class="dropdown-menu dropdown-menu-end" style="background:var(--bg-secondary);border:1px solid var(--border-color)">
            <li><button class="dropdown-item" onclick="LP.logout()" style="color:var(--accent-danger);font-size:13px;padding:8px 14px"><i class="bi bi-box-arrow-right me-2"></i>Logout</button></li>
          </ul>
        </div>
      </div>
    </header>

    <main class="lp-content">
      <div class="lp-page-header" style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <h1 class="lp-page-title">User Management</h1>
          <p class="lp-page-subtitle">Manage system users and access levels</p>
        </div>
        <button class="btn-lp btn-lp-primary" onclick="UsersPage.showCreateModal()"><i class="bi bi-plus-lg"></i> Add User</button>
      </div>

      <div class="lp-card">
        <div class="lp-card-body" style="padding:0;overflow-x:auto">
          <table class="lp-table">
            <thead>
              <tr>
                <th>User</th>
                <th>Role</th>
                <th>Status</th>
                <th>Last Login</th>
                <th style="text-align:right">Actions</th>
              </tr>
            </thead>
            <tbody id="usersTableBody">
              <tr><td colspan="5" style="text-align:center;color:var(--text-muted);padding:20px">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/app.js"></script>
<script>
const UsersPage = (() => {
  async function loadUsers() {
    const res = await LP.get('/users');
    const tbody = document.getElementById('usersTableBody');
    if (!res?.success) {
      tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--text-danger)">Failed to load users</td></tr>';
      return;
    }

    const users = res.data.users || [];
    if (!users.length) {
      tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--text-muted)">No users found</td></tr>';
      return;
    }

    tbody.innerHTML = users.map(u => `
      <tr>
        <td>
          <div style="display:flex;align-items:center;gap:12px">
            <div class="lp-user-avatar" style="width:36px;height:36px">${(u.firstName?.[0] || u.username[0]).toUpperCase()}</div>
            <div>
              <div style="font-weight:500;color:var(--text-primary)">${u.username} ${u.isSuperAdmin ? '<i class="bi bi-patch-check-fill text-primary" title="Super Admin"></i>' : ''}</div>
              <div style="font-size:12px;color:var(--text-muted)">${u.email}</div>
            </div>
          </div>
        </td>
        <td><span class="lp-badge" style="background:var(--bg-card);border:1px solid var(--border-color)">${u.role?.name || '—'}</span></td>
        <td>
          <span class="lp-badge ${u.isActive ? 'lp-badge-success' : 'lp-badge-danger'}">
            <span class="lp-badge-dot"></span>${u.isActive ? 'Active' : 'Disabled'}
          </span>
        </td>
        <td style="color:var(--text-muted);font-size:12px">${u.lastLoginAt ? new Date(u.lastLoginAt).toLocaleString() : 'Never'}</td>
        <td style="text-align:right">
          <button class="btn-lp btn-lp-ghost btn-lp-icon"><i class="bi bi-pencil"></i></button>
          <button class="btn-lp btn-lp-ghost btn-lp-icon text-danger" ${u.isSuperAdmin ? 'disabled' : ''}><i class="bi bi-trash"></i></button>
        </td>
      </tr>
    `).join('');
  }

  return {
    async init() {
      await LP.init();
      if (!LP.state.accessToken) return;
      loadUsers();
    },
    showCreateModal() { LP.toast('User creation coming soon', 'info'); }
  };
})();
document.addEventListener('DOMContentLoaded', () => UsersPage.init());
</script>
</body>
</html>
