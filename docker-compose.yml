version: '3.8'

services:
  app:
    build: .
    container_name: linux-panel
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGO_URI=mongodb://mongo:27017/linux-panel
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    env_file:
      - .env
    volumes:
      - ./storage:/app/storage
      - /var/run/docker.sock:/var/run/docker.sock:ro  # for docker management
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - panel-net

  mongo:
    image: mongo:7-jammy
    container_name: linux-panel-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - panel-net

  redis:
    image: redis:7-alpine
    container_name: linux-panel-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - panel-net

volumes:
  mongo-data:
  redis-data:

networks:
  panel-net:
    driver: bridge
