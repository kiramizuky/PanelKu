version: '3.8'

services:
  app:
    build: .
    container_name: linux-panel
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_PATH=/app/storage/panelku.db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    env_file:
      - .env
    volumes:
      - ./storage:/app/storage
      - /var/run/docker.sock:/var/run/docker.sock:ro  # for docker management
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - panel-net

  redis:
    image: redis:7-alpine
    container_name: linux-panel-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - panel-net

volumes:
  redis-data:

networks:
  panel-net:
